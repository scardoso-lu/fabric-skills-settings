model_reasoning_effort = "high"
model_verbosity = "low"
model_auto_compact_token_limit = 120000

[agents]
max_threads = 6
max_depth = 1

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false

[mcp_servers.fabric]
command = "python"
args = ["bin/mcp/server.py"]
startup_timeout_ms = 20000
tool_timeout_ms = 120000
