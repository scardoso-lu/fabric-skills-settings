[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fabric-skills-settings"
version = "0.2"
description = "Install Microsoft Fabric agent profiles (Claude Code and Codex) into a target repository."
requires-python = ">=3.10"
readme = "README.md"
license = { text = "MIT" }

[project.scripts]
install-fabric-agent = "fabric_skills_settings._installer:main"

[dependency-groups]
dev = ["pytest>=8", "Faker>=26", "mimesis>=18", "scikit-learn>=1.5", "pandas>=2"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["fabric_skills_settings"]

[tool.hatch.build.targets.wheel.force-include]
"profiles" = "fabric_skills_settings/_profiles"

[tool.hatch.build.targets.sdist]
include = [
    "fabric_skills_settings/",
    "profiles/",
    "bin/",
    "tool/",
    "tests/",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
