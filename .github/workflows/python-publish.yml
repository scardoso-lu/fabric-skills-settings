# Publishes the fabric-skills-settings package to PyPI when a GitHub Release is
# published. The package is a hatchling + hatch-vcs project (version derived
# from the git tag), built with uv. Console scripts shipped by the wheel:
# fabric-agents, fabric-cli.
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from tags — full history is required.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (dev group + all extras)
        run: uv sync --group dev --all-extras

      - name: Run tests + source-package validators
        # Includes tests/test_install_package.py and tests/test_agent_guidance.py.
        run: uv run --group dev pytest

  release-build:
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - uses: actions/checkout@v4
        with:
          # uv build invokes hatch-vcs; it needs the tag history to set the version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build release distributions
        run: uv build

      - name: Verify console scripts are registered in the wheel
        run: |
          ep="$(unzip -p dist/*.whl '*/entry_points.txt')"
          echo "$ep"
          for script in fabric-agents fabric-cli; do
            echo "$ep" | grep -q "^${script} =" || { echo "missing console script: ${script}"; exit 1; }
          done

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/project/fabric-skills-settings/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
