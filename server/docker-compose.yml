# Local dev: one container hosting the fabric + graph + Fabric-helper MCP tools.
# Run from the server/ directory: `docker compose up --build`.
#
# The image bakes the graph artifact and all server content. No host mount is
# needed for the graph. MCP auth (API-key + JWT):
#   - Admin creates ./config/api-keys.txt with one API key per line (lines
#     starting with # are comments). Each user gets one key from this file.
#   - FABRIC_MCP_JWT_SECRET must be set (generate: python -c "import secrets;
#     print(secrets.token_hex(32))"). Add it to a .env file next to this file.
#   - Clients POST {"api_key": "..."} to /auth/login to receive a 1-hour JWT,
#     then send Authorization: Bearer <token> with every MCP request.
#   - Auth is disabled entirely when FABRIC_MCP_API_KEYS_FILE is not set and
#     FABRIC_MCP_API_KEYS is empty (local single-user dev mode).
# Env passed from host:
#   - FABRIC_WORKSPACE_ID
#
# Host-only binding (127.0.0.1:8000) — no LAN exposure.

services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: fabric-mcp-server
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://127.0.0.1:8000}
      FABRIC_MCP_API_KEYS_FILE: /config/api-keys.txt
      FABRIC_MCP_JWT_SECRET: ${FABRIC_MCP_JWT_SECRET}
    volumes:
      - ./config/api-keys.txt:/config/api-keys.txt:ro
      - ./data:/data
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
