# Run from the repo root: `docker compose up --build`.
#
# Two services:
#   server  — FastMCP HTTP server (MCP tools + admin REST API) on port 8000
#   frontend — Next.js management UI on port 3000
#
# MCP auth (API-key + JWT):
#   - Add FABRIC_MCP_API_KEYS=<your-key> and FABRIC_MCP_JWT_SECRET=<secret> to .env.
#   - Generate JWT secret: python -c "import secrets; print(secrets.token_hex(32))"
#   - Auth is disabled when both FABRIC_MCP_API_KEYS and FABRIC_MCP_API_KEYS_DB are empty.
#   - For multi-user deployments use FABRIC_MCP_API_KEYS_DB=/config/api-keys.db (SQLite).
#
# Managed content (persistent across restarts):
#   - User-created skills and content go to ./server/data/managed/ (volume-mounted into server).
#   - The graph auto-rebuilds after every write.
#
# Host-only binding (127.0.0.1) — no LAN exposure.

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fabric-mcp-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # server writes to managed/ and dist/.graph/
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Public URL of this server — used by FastMCP OAuth discovery and by the
      # auth/refresh CLI tool. MUST be set in .env for any non-localhost deployment.
      # Example: MCP_SERVER_URL=https://scardoso-lu.duckdns.org
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://127.0.0.1:8000}
      # CORS: allow requests from the frontend and any direct browser clients.
      # For production behind nginx set FABRIC_CORS_ORIGINS in .env, e.g.:
      #   FABRIC_CORS_ORIGINS=https://scardoso-lu.duckdns.org,http://localhost:3000
      FABRIC_CORS_ORIGINS: ${FABRIC_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # ── Auth ──────────────────────────────────────────────────────────────
      # Multi-user / admin-UI manageable (recommended):
      #   FABRIC_MCP_API_KEYS_DB=/config/api-keys.db
      #   The ./config volume below is writable by the server user.
      #
      # Single-key dev: FABRIC_MCP_API_KEYS=<key> (in-memory, no CRUD).
      # Auth disabled entirely when both vars are empty.
      FABRIC_MCP_API_KEYS: ${FABRIC_MCP_API_KEYS:-}
      FABRIC_MCP_API_KEYS_DB: ${FABRIC_MCP_API_KEYS_DB:-}
      # Required when any keys are configured:
      FABRIC_MCP_JWT_SECRET: ${FABRIC_MCP_JWT_SECRET:-}
    volumes:
      - ./server/data:/data
      - ./server/data/managed:/app/server/managed
      # Writable config dir for SQLite API key database.
      # The server user (uid 10001) must own this directory.
      - ./config:/config
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

  frontend:
    build:
      context: frontend
      dockerfile: docker/Dockerfile
    container_name: fabric-admin-ui
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Next.js writes .next/ cache at runtime
    environment:
      # URL the browser uses to reach the server API.
      # With host-only ports this must be localhost (browser → host → container).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Internal URL for Next.js server-side requests (rewrites) if needed.
      FABRIC_API_URL: "http://server:8000"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - web
networks:
  web:
    external: true
