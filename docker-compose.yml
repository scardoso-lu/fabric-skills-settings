# Run from the repo root: `docker compose up --build`.
#
# Three services:
#   postgres  — PostgreSQL 16 (API keys + sandbox data)
#   server    — FastMCP HTTP server (MCP tools + admin REST API) on port 8000
#   frontend  — Next.js management UI on port 3000
#
# MCP auth (API-key + JWT):
#   - Add FABRIC_MCP_API_KEYS=<your-key> and FABRIC_MCP_JWT_SECRET=<secret> to .env.
#   - Generate JWT secret: python -c "import secrets; print(secrets.token_hex(32))"
#   - Auth is disabled when both FABRIC_MCP_API_KEYS and DATABASE_URL are empty.
#   - For multi-user deployments set DATABASE_URL (handled via the postgres service below).
#
# Managed content (persistent across restarts):
#   - User-created skills and content go to ./server/data/managed/ (volume-mounted into server).
#   - The graph auto-rebuilds after every write.
#
# Host-only binding (127.0.0.1) — no LAN exposure.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fabric-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fabric}
      POSTGRES_USER: ${POSTGRES_USER:-fabric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fabric} -d ${POSTGRES_DB:-fabric}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - web

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fabric-mcp-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # server writes to managed/ and dist/.graph/
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Public URL of this server — used by FastMCP OAuth discovery and by the
      # auth/refresh CLI tool. MUST be set in .env for any non-localhost deployment.
      # Example: MCP_SERVER_URL=https://scardoso-lu.duckdns.org
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://127.0.0.1:8000}
      # CORS: allow requests from the frontend and any direct browser clients.
      FABRIC_CORS_ORIGINS: ${FABRIC_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # ── Auth ──────────────────────────────────────────────────────────────
      # DATABASE_URL is assembled from the postgres service credentials.
      # Override in .env to point at an external PostgreSQL instance.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-fabric}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fabric}}
      # Optional inline read-only keys (no CRUD, useful for single-user dev).
      FABRIC_MCP_API_KEYS: ${FABRIC_MCP_API_KEYS:-}
      # Required when any keys are configured:
      FABRIC_MCP_JWT_SECRET: ${FABRIC_MCP_JWT_SECRET:-}
    volumes:
      - ./server/data:/data
      - ./server/data/managed:/app/server/managed
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

  frontend:
    build:
      context: frontend
      dockerfile: docker/Dockerfile
    container_name: fabric-admin-ui
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Next.js writes .next/ cache at runtime
    environment:
      # URL the browser uses to reach the server API.
      # With host-only ports this must be localhost (browser → host → container).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Internal URL for Next.js server-side requests (rewrites) if needed.
      FABRIC_API_URL: "http://server:8000"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - web

volumes:
  postgres_data:

networks:
  web:
    external: true
